name: production

on:
    push:
      branches:
        - main

permissions:
    packages: write
    contents: read

jobs:
    build-and-push:
      runs-on: ubuntu-latest
      environment: production
      steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - name: Set lowercase image name
          run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2

        - name: Cache Docker layers
          uses: actions/cache@v4
          with:
            path: /tmp/.buildx-cache
            key: ${{ runner.os }}-buildx-${{ github.sha }}
            restore-keys: |
              ${{ runner.os }}-buildx-

        - name: Login to GitHub Container Registry
          uses: docker/login-action@v2
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and push Docker image
          run: |
            docker build -f Dockerfile -t ${{ env.IMAGE }}:latest .
            docker push ${{ env.IMAGE }}:latest

    deploy:
      needs: build-and-push
      runs-on: ubuntu-latest
      environment: production
      steps:
        - name: Set lowercase image name
          run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

        - name: Deploy to VPS
          uses: appleboy/ssh-action@v0.1.9
          with:
            host: ${{ secrets.VPS_HOST }}
            username: root
            key: ${{ secrets.SSH_KEY }}
            port: 22
            script: |
              docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.TOKEN }}
              docker pull ${{ env.IMAGE }}:latest
              docker stop ${{ github.event.repository.name }} || true
              docker rm ${{ github.event.repository.name }} || true
              docker run -d --name ${{ github.event.repository.name }} \
                -p 11000:8080 \
                ${{ env.IMAGE }}:latest
